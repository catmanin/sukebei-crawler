name: Sukebei Crawler Loop

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  actions: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    concurrency:
      group: crawler-loop
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi beautifulsoup4

      - name: Run Crawler (1100 IDs batch)
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          echo "Starting crawler batch..."
          if [ -n "$PROXY_URL" ]; then
            python aws_nyaa_crawler.py --workers 5 --batch-size 1100 --proxy "$PROXY_URL"
          else
            python aws_nyaa_crawler.py --workers 5 --batch-size 1100
          fi

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add crawler_state.json nyaa_results_*.jsonl || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: Crawler progress and results"
            git push
          fi

      - name: Trigger next run after delay
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting 1 minute before triggering next run..."
          sleep 60
          gh workflow run "Sukebei Crawler Loop" --ref main
